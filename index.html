<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <h1 class="uppercase">Alpaca generator</h1>
      <div class="content">
        <div class="visual">
          <div class="default-bg"></div>
          <div class="default-ears"></div>
          <div class="default-neck"></div>
          <div class="default-nose"></div>
          <div class="default-hair"></div>
          <div class="default-mouth"></div>
          <div class="default-eyes"></div>
          <div class="default-leg"></div>
          <div class="default-accesories"></div>
        </div>
        <div class="picker">
          <div class="accessory">
            <p class="uppercase">
              <strong>Accesorize the alpaca´s</strong>
            </p>
            <div class="buttons-wrapper">
              <button>Hair</button>
              <button>Ears</button>
              <button>Eyes</button>
              <button>Mouth</button>
              <button>Neck</button>
              <button>Leg</button>
              <button>Accesories</button>
              <button>Background</button>
            </div>
          </div>
          <div class="style">
            <p class="uppercase">
              <strong>Style</strong>
            </p>
            <div class="buttons-wrapper">
              <button>Default</button>
              <button>Curls</button>
              <button>Short</button>
              <button>Bang</button>
              <button>Elegant</button>
              <button>Quiff</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
