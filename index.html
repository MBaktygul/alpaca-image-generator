<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <h1 class="uppercase">Alpaca generator</h1>
      <div class="content">
        <div class="visual">
          <div class="default-bg"></div>
          <div class="default-ears"></div>
          <div class="default-neck"></div>
          <div class="default-nose"></div>
          <div class="default-hair"></div>
          <div class="default-mouth"></div>
          <div class="default-eyes"></div>
          <div class="default-leg"></div>
          <div class="default-accessories"></div>
          <div class="bottom-buttons">
            <button class="random-button">Random</button>
            <button class="download-button">Download</button>
          </div>
        </div>
        <div class="picker">
          <div class="accessory">
            <p class="uppercase">
              <strong>Accesorize the alpaca´s</strong>
            </p>
            <div class="buttons-wrapper">
              <button id="hair">Hair</button>
              <button id="ears">Ears</button>
              <button id="eyes">Eyes</button>
              <button id="mouth">Mouth</button>
              <button id="neck">Neck</button>
              <button id="leg">Leg</button>
              <button id="accessories">Accessories</button>
              <button id="background">Background</button>
            </div>
          </div>
          <div class="style">
            <p class="uppercase">
              <strong>Style</strong>
            </p>

            <!-- hair styles-->
            <div class="buttons-wrapper hair-styles-wrapper">
              <button id="hair-default">Default</button>
              <button id="hair-curls">Curls</button>
              <button id="hair-short">Short</button>
              <button id="hair-bang">Bang</button>
              <button id="hair-elegant">Elegant</button>
              <button id="hair-quiff">Quiff</button>
            </div>

            <!-- ears styles-->
            <div class="buttons-wrapper ears-styles-wrapper">
              <button id="ears-default">Default</button>
              <button id="ears-backward">Tilt backward</button>
              <button id="ears-forward">Tilt forward</button>
            </div>

            <!-- eyes styles-->
            <div class="buttons-wrapper eyes-styles-wrapper">
              <button id="eyes-default">Default</button>
              <button id="eyes-angry">Angry</button>
              <button id="eyes-naughty">Naughty</button>
              <button id="eyes-panda">Panda</button>
              <button id="eyes-smart">Smart</button>
              <button id="eyes-star">Star</button>
            </div>

            <!-- mouth styles-->
            <div class="buttons-wrapper mouth-styles-wrapper">
              <button id="mouth-default">Default</button>
              <button id="mouth-astonished">Astonished</button>
              <button id="mouth-eating">Eating</button>
              <button id="mouth-laugh">Laugh</button>
              <button id="mouth-tongue">Tongue</button>
            </div>

            <!-- neck styles-->
            <div class="buttons-wrapper neck-styles-wrapper">
              <button id="neck-default">Default</button>
              <button id="neck-backward">Backward</button>
              <button id="neck-forward">Forward</button>
              <button id="neck-thick">Thick</button>
            </div>

            <!-- leg styles-->
            <div class="buttons-wrapper leg-styles-wrapper">
              <button id="leg-default">Default</button>
              <button id="leg-bubble-tea">Bubble tea</button>
              <button id="leg-cookie">Cookie</button>
              <button id="leg-game-console">Game console</button>
              <button id="leg-tilt-backward">Backward</button>
              <button id="leg-tilt-forward">Forward</button>
            </div>

            <!-- accessories styles-->
            <div class="buttons-wrapper accessories-styles-wrapper">
              <button id="accessories-earings">Earings</button>
              <button id="accessories-flower">Flower</button>
              <button id="accessories-glasses">Glasses</button>
              <button id="accessories-headphone">Headphone</button>
            </div>

            <!-- background styles-->
            <div class="buttons-wrapper background-styles-wrapper">
              <button id="background-blue50">Blue 50</button>
              <button id="background-blue60">Blue 60</button>
              <button id="background-blue70">Blue 70</button>
              <button id="background-darkblue30">Dark blue 30</button>
              <button id="background-darkblue50">Dark blue 50</button>
              <button id="background-darkblue70">Dark blue 70</button>
              <button id="background-green50">Green 50</button>
              <button id="background-green60">Green 60</button>
              <button id="background-green70">Green 70</button>
              <button id="background-grey40">Grey 40</button>
              <button id="background-grey70">Grey 70</button>
              <button id="background-grey80">Grey 80</button>
              <button id="background-red50">Red 50</button>
              <button id="background-red60">Red 60</button>
              <button id="background-red70">Red 70</button>
              <button id="background-yellow50">Yellow 50</button>
              <button id="background-yellow60">Yellow 60</button>
              <button id="background-yellow70">Yellow 70</button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </body>
</html>
