<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <h1 class="uppercase">Alpaca generator</h1>
      <div class="content">
        <div class="visual">
          <div class="default-bg"></div>
          <div class="default-ears"></div>
          <div class="default-neck"></div>
          <div class="default-nose"></div>
          <div class="default-hair"></div>
          <div class="default-mouth"></div>
          <div class="default-eyes"></div>
          <div class="default-leg"></div>
          <div class="default-accesories"></div>
        </div>
        <div class="picker">
          <div class="accessory">
            <p class="uppercase">
              <strong>Accesorize the alpaca´s</strong>
            </p>
            <div class="buttons-wrapper">
              <button id="hair">Hair</button>
              <button id="ears">Ears</button>
              <button if="eyes">Eyes</button>
              <button id="mouth">Mouth</button>
              <button id="neck">Neck</button>
              <button id="leg">Leg</button>
              <button id="accesories">Accesories</button>
              <button id="background">Background</button>
            </div>
          </div>
          <div class="style">
            <p class="uppercase">
              <strong>Style</strong>
            </p>

            <!-- hair styles-->
            <div class="buttons-wrapper hair-styles-wrapper">
              <button id="hair-default">Default</button>
              <button id="hair-curls">Curls</button>
              <button id="hair-short">Short</button>
              <button id="hair-bang">Bang</button>
              <button id="hair-elegant">Elegant</button>
              <button id="hair-quiff">Quiff</button>
            </div>

            <!-- ears styles-->
            <div class="buttons-wrapper ears-styles-wrapper">
              <button id="ears-default">Default</button>
              <button id="ears-backward">Curls</button>
              <button id="ears-forward">Short</button>
            </div>

            <!-- eyes styles-->
            <div class="buttons-wrapper eyes-styles-wrapper">
              <button id="eyes-default">Default</button>
              <button id="eyes-angry">Curls</button>
              <button id="eyes-naughty">Short</button>
              <button id="eyes-panda">Default</button>
              <button id="eyes-smart">Curls</button>
              <button id="eyes-star">Short</button>
            </div>

            <!-- mouth styles-->
            <div class="buttons-wrapper mouth-styles-wrapper">
              <button id="mouth-default">Default</button>
              <button id="mouth-astonished">Curls</button>
              <button id="mouth-eating">Short</button>
              <button id="mouth-laugh">Default</button>
              <button id="mouth-tongue">Curls</button>
            </div>

            <!-- neck styles-->
            <div class="buttons-wrapper neck-styles-wrapper">
              <button id="neck-default">Default</button>
              <button id="neck-backward">Curls</button>
              <button id="neck-forward">Short</button>
              <button id="neck-thick">Default</button>
            </div>

            <!-- leg styles-->
            <div class="buttons-wrapper leg-styles-wrapper">
              <button id="leg-default">Default</button>
              <button id="leg-bubble-tea">Curls</button>
              <button id="leg-cookie">Short</button>
              <button id="leg-game-console">Default</button>
              <button id="leg-tilt-backward">Short</button>
              <button id="leg-tilt-forward">Default</button>
            </div>

            <!-- accesories styles-->
            <div class="buttons-wrapper accesories-styles-wrapper">
              <button id="accesories-earings">Default</button>
              <button id="accesories-flower">Curls</button>
              <button id="accesories-glasses">Short</button>
              <button id="accesories-headphone">Default</button>
            </div>

            <!-- background styles-->
            <div class="buttons-wrapper background-styles-wrapper">
              <button id="background-blue50">Default</button>
              <button id="background-blue60">Default</button>
              <button id="background-blue70">Default</button>
              <button id="background-darkblue30">Default</button>
              <button id="background-darkblue50">Default</button>
              <button id="background-darkblue70">Default</button>
              <button id="background-green50">Default</button>
              <button id="background-green60">Default</button>
              <button id="background-green70">Default</button>
              <button id="background-grey40">Default</button>
              <button id="background-grey70">Default</button>
              <button id="background-grey80">Default</button>
              <button id="background-red50">Default</button>
              <button id="background-red60">Default</button>
              <button id="background-red70">Default</button>
              <button id="background-yellow50">Default</button>
              <button id="background-yellow60">Default</button>
              <button id="background-yellow70">Default</button>
            </div>

          </div>
        </div>
        <div class="bottom-buttons">
          <button class="random-button">Random</button>
          <button class="download-button">Download</button>
        </div>
      </div>
    </div>
  </body>
</html>
